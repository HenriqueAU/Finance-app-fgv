<button (click)="toggleSidebar()" 
        class="fixed top-6 left-6 z-[60] p-3 rounded-2xl bg-white/90 dark:bg-[#121212]/90 backdrop-blur-md border border-slate-200 dark:border-white/10 shadow-lg hover:scale-105 active:scale-95 transition-all group">
  <svg class="w-6 h-6 text-slate-800 dark:text-white group-hover:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
          [attr.d]="isOpen() ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'"></path>
  </svg>
</button>

@if (isOpen()) {
  <div class="fixed inset-0 bg-black/20 dark:bg-black/60 backdrop-blur-sm z-[45]" (click)="toggleSidebar()"></div>
}

<aside [class.-translate-x-full]="!isOpen()" 
       class="fixed left-0 top-0 w-[300px] h-screen bg-white/95 dark:bg-[#050505]/95 backdrop-blur-2xl border-r border-slate-100 dark:border-white/5 flex flex-col justify-between transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] z-50 pt-24 shadow-2xl">
  
  <div>
    <div class="px-8 pb-8">
      <h2 class="text-2xl font-black tracking-tighter text-slate-900 dark:text-white uppercase">
        Finance<span class="text-emerald-500">.io</span>
      </h2>
    </div>

    <nav class="px-4 flex flex-col gap-2">
      <a routerLink="/dashboard" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100 dark:hover:bg-white/5 transition-all">
        <span class="transform transition-transform group-hover:translate-x-2">Dashboard</span>
      </a>
      <a routerLink="/contas-fixas" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100 dark:hover:bg-white/5 transition-all">
        <span class="transform transition-transform group-hover:translate-x-2">Contas Fixas</span>
      </a>
      <a routerLink="/parcelamentos" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100 dark:hover:bg-white/5 transition-all">
        <span class="transform transition-transform group-hover:translate-x-2">Parcelamentos</span>
      </a>
      <a routerLink="/intencoes" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100 dark:hover:bg-white/5 transition-all">
        <span class="transform transition-transform group-hover:translate-x-2">Intenções</span>
      </a>
    </nav>
  </div>

  <div class="p-6 flex flex-col gap-3">
    <button (click)="toggleTheme()" class="w-full flex items-center justify-center gap-3 p-4 rounded-2xl bg-slate-50 dark:bg-white/5 font-bold text-sm dark:text-slate-300">
      {{ isDarkMode() ? '☀️ Claro' : '🌙 Escuro' }}
    </button>
    <button routerLink="/login" class="w-full py-4 text-sm text-rose-600 font-bold rounded-2xl hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all">
      Sair da Conta
    </button>
  </div>
</aside>

@if (isOpen()) {
  <div class="fixed inset-0 bg-black/20 dark:bg-black/60 backdrop-blur-sm z-[45] transition-opacity duration-300" 
       (click)="toggleSidebar()"></div>
}

<aside [class.-translate-x-full]="!isOpen()" 
       [class.translate-x-0]="isOpen()"
       class="fixed left-0 top-0 w-[320px] h-screen bg-white/90 dark:bg-[#050505]/95 backdrop-blur-2xl border-r border-slate-100 dark:border-white/5 flex flex-col justify-between transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] z-50 pt-24 shadow-2xl shadow-black/10">
  
  <div>
    <div class="px-8 pb-8">
      <h2 class="text-2xl font-black tracking-tighter text-slate-900 dark:text-white uppercase leading-tight">
        Planejador<br><span class="text-emerald-500">Financeiro</span>
      </h2>
    </div>

    <nav class="px-4 flex flex-col gap-2">
      <a routerLink="/dashboard" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg shadow-black/10 scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-300">
        <span class="transform transition-transform duration-300 group-hover:translate-x-2">Dashboard</span>
      </a>
      
      <a routerLink="/contas-fixas" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg shadow-black/10 scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-300">
        <span class="transform transition-transform duration-300 group-hover:translate-x-2">Contas Fixas</span>
      </a>
      
      <a routerLink="/parcelamentos" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg shadow-black/10 scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-300">
        <span class="transform transition-transform duration-300 group-hover:translate-x-2">Parcelamentos</span>
      </a>
      
      <a routerLink="/intencoes" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg shadow-black/10 scale-[1.02]" 
         class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100/50 dark:hover:bg-white/5 hover:text-slate-900 dark:hover:text-white transition-all duration-300">
        <span class="transform transition-transform duration-300 group-hover:translate-x-2">Intenções de Compra</span>
      </a>

      <a routerLink="/cartoes" routerLinkActive="bg-black text-white dark:bg-white dark:text-black shadow-lg scale-[1.02]" 
          class="group flex items-center px-4 py-4 text-sm font-bold text-slate-500 dark:text-slate-400 rounded-[20px] hover:bg-slate-100 dark:hover:bg-white/5 transition-all">
        <span class="transform transition-transform group-hover:translate-x-2">Meus Cartões</span>
      </a>
    </nav>
  </div>

  <div class="p-6 flex flex-col gap-3">
    
    <button (click)="toggleTheme()" class="w-full group flex items-center justify-center gap-3 p-4 rounded-2xl bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 transition-all duration-300 font-bold text-sm text-slate-700 dark:text-slate-300">
      <span class="transform transition-transform duration-300 group-hover:scale-110">{{ isDarkMode() ? '☀️ Modo Claro' : '🌙 Modo Escuro' }}</span>
    </button>
    
    <a routerLink="/configuracoes" routerLinkActive="bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-white" 
       class="group flex items-center px-4 py-4 rounded-2xl text-slate-500 dark:text-slate-400 font-bold hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-white/5 transition-all duration-300 text-sm">
      <span class="transform transition-transform duration-300 group-hover:translate-x-2">Configurações</span>
    </a>
    
    <button routerLink="/login" 
            class="w-full flex items-center justify-center px-4 py-4 text-sm text-rose-600 dark:text-rose-500 font-bold rounded-2xl hover:bg-rose-50 dark:hover:bg-rose-500/10 hover:shadow-lg hover:shadow-rose-500/10 transition-all duration-300 mt-2">
      Sair da Conta
    </button>
  </div>
</aside>
