<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-[#050505] relative overflow-hidden font-sans p-4 py-12">

  <!-- Efeitos de Luz no Background (Glow) invertidos -->
  <div class="absolute top-1/4 right-1/4 w-96 h-96 bg-emerald-500/20 dark:bg-emerald-500/10 rounded-full blur-[120px] mix-blend-multiply dark:mix-blend-screen pointer-events-none"></div>
  <div class="absolute bottom-1/4 left-1/4 w-96 h-96 bg-amber-500/20 dark:bg-amber-500/10 rounded-full blur-[120px] mix-blend-multiply dark:mix-blend-screen pointer-events-none"></div>

  <!-- Card Principal Glassmorphism (Usando max-w-2xl por conta do grid) -->
  <div class="max-w-2xl w-full bg-white/80 dark:bg-[#121212]/80 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[32px] shadow-2xl p-8 sm:p-10 z-10 relative animate-in fade-in slide-in-from-bottom-4 duration-700">

    <!-- Cabeçalho -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-emerald-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-xl shadow-emerald-500/20 -rotate-3 hover:rotate-0 transition-all duration-300">
        <svg class="w-8 h-8 text-emerald-950" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
      </div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter leading-none">Crie sua Conta</h2>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-3">Configuração Financeira (MVP)</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

      <!-- Nome Completo -->
      <div class="md:col-span-2">
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 pl-1">Nome Completo</label>
        <input [(ngModel)]="form.name" type="text" placeholder="Como devemos te chamar?" class="w-full bg-slate-50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50">
      </div>

      <!-- E-mail -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 pl-1">E-mail</label>
        <input [(ngModel)]="form.email" type="email" placeholder="seu@email.com" class="w-full bg-slate-50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50">
      </div>

      <!-- Senha -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 pl-1">Senha</label>
        <input [(ngModel)]="form.password" type="password" placeholder="••••••••" class="w-full bg-slate-50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-black tracking-widest focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50">
      </div>

      <!-- Divisor: Dados para Projeção -->
      <div class="md:col-span-2 mt-4 mb-1 flex items-center gap-4">
        <div class="h-px bg-slate-200 dark:bg-white/10 flex-1"></div>
        <span class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em]">Dados para Projeção</span>
        <div class="h-px bg-slate-200 dark:bg-white/10 flex-1"></div>
      </div>

      <!-- Salário Mensal -->
      <div>
        <label class="block text-[10px] font-black text-emerald-600 dark:text-emerald-500 uppercase tracking-[0.2em] mb-2 pl-1">Salário Mensal (R$)</label>
        <input [(ngModel)]="form.salary" type="number" placeholder="0.00" class="w-full bg-emerald-50/50 dark:bg-emerald-500/5 border border-emerald-200/50 dark:border-emerald-500/20 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50">
      </div>

      <!-- Dia de Recebimento -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 pl-1">Dia de Recebimento</label>
        <input [(ngModel)]="form.payday" type="number" min="1" max="31" placeholder="Ex: 5" class="w-full bg-slate-50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50">
      </div>

      <!-- Reserva de Emergência -->
      <div class="md:col-span-2">
        <label class="block text-[10px] font-black text-rose-600 dark:text-rose-500 uppercase tracking-[0.2em] mb-2 pl-1">Reserva Alvo (R$)</label>
        <input [(ngModel)]="form.emergency_reserve" type="number" placeholder="0.00" class="w-full bg-rose-50/50 dark:bg-rose-500/5 border border-rose-200/50 dark:border-rose-500/20 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-bold focus:outline-none focus:ring-2 focus:ring-rose-500 transition-all placeholder:text-slate-400/50">
        <p class="text-[10px] font-bold text-slate-400/70 dark:text-slate-500 mt-3 pl-2">* Critério para alerta de meses críticos no sistema.</p>
      </div>

    </div>

    <!-- Botão Finalizar -->
    <div class="mt-8">
      <button (click)="handleRegister()"
              class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-emerald-950 font-black uppercase tracking-widest text-xs rounded-2xl transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
        Finalizar Cadastro
      </button>
    </div>

    <!-- Link para Login (Adicionado para fechar a navegação) -->
    <p class="mt-8 text-center text-xs font-bold text-slate-500 dark:text-slate-400">
      Já possui conta? <a routerLink="/login" class="text-emerald-500 font-black hover:text-emerald-400 uppercase tracking-wider transition-colors ml-1">Entrar aqui</a>
    </p>

  </div>

  <!-- Botão Flutuante Dark Mode -->
<button (click)="toggleDarkMode()" 
        class="fixed bottom-8 right-8 w-14 h-14 bg-white/80 dark:bg-white/10 backdrop-blur-xl border border-slate-200 dark:border-white/10 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all z-50 group">
  <svg class="w-6 h-6 text-slate-700 dark:text-amber-400 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
  </svg>
</button>

</div>
