<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-[#050505] relative overflow-hidden font-sans p-4">
  
  <!-- Efeitos de Luz no Background (Glow) -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-500/20 dark:bg-emerald-500/10 rounded-full blur-[120px] mix-blend-multiply dark:mix-blend-screen pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-amber-500/20 dark:bg-amber-500/10 rounded-full blur-[120px] mix-blend-multiply dark:mix-blend-screen pointer-events-none"></div>

  <!-- Card Principal Glassmorphism -->
  <div class="max-w-md w-full bg-white/80 dark:bg-[#121212]/80 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[32px] shadow-2xl p-8 sm:p-10 z-10 relative animate-in fade-in slide-in-from-bottom-4 duration-700">
    
    <!-- Cabeçalho -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-slate-900 dark:bg-white rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-xl shadow-black/10 rotate-3 hover:rotate-0 transition-all duration-300">
        <svg class="w-8 h-8 text-white dark:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      </div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter leading-none">Bem-vindo</h2>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-3">Acesse seu planejador financeiro</p>
    </div>
    
    <!-- Formulário (Com a sua lógica exata de ngModel) -->
    <div class="space-y-5">
      
      <!-- Campo E-mail -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 pl-1">E-mail</label>
        <input [(ngModel)]="email" type="email" placeholder="nome@exemplo.com" 
               class="w-full bg-slate-50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50">
      </div>
      
      <!-- Campo Senha -->
      <div>
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 pl-1">Senha</label>
        <input [(ngModel)]="password" type="password" placeholder="••••••••" 
               class="w-full bg-slate-50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-2xl px-5 py-4 text-slate-900 dark:text-white font-black focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-400/50 tracking-widest">
      </div>
      
      <!-- Botão Entrar -->
      <div class="pt-2">
        <button (click)="handleLogin()" 
                class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-emerald-950 font-black uppercase tracking-widest text-xs rounded-2xl transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
          Entrar
        </button>
      </div>
    </div>
    
    <!-- Link para Registro -->
    <p class="mt-8 text-center text-xs font-bold text-slate-500 dark:text-slate-400">
      Ainda não tem conta? <a routerLink="/register" class="text-emerald-500 font-black hover:text-emerald-400 uppercase tracking-wider transition-colors ml-1">Criar agora</a>
    </p>

  </div>

  <!-- Botão Flutuante Dark Mode -->
<button (click)="toggleDarkMode()" 
        class="fixed bottom-8 right-8 w-14 h-14 bg-white/80 dark:bg-white/10 backdrop-blur-xl border border-slate-200 dark:border-white/10 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all z-50 group">
  <svg class="w-6 h-6 text-slate-700 dark:text-amber-400 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
  </svg>
</button>
</div>
