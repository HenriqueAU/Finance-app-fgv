<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-10 border border-slate-100">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-slate-900">Bem-vindo</h2>
      <p class="text-slate-500 mt-2">Acesse seu planejador financeiro</p>
    </div>
    
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail</label>
        <input [(ngModel)]="email" type="email" placeholder="nome@exemplo.com" 
               class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input [(ngModel)]="password" type="password" placeholder="••••••••" 
               class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>
      
      <button (click)="handleLogin()" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95">
        Entrar
      </button>
    </div>
    
    <p class="mt-8 text-center text-slate-600 text-sm">
      Ainda não tem conta? <a routerLink="/register" class="text-blue-600 font-bold hover:underline">Criar agora</a>
    </p>
  </div>
</div>
