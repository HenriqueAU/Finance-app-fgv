<div class="min-h-screen bg-slate-50 dark:bg-[#050505] transition-colors duration-300 font-sans flex flex-col">
  <app-sidebar></app-sidebar>

  <nav class="fixed top-0 left-0 right-0 h-20 bg-slate-50/80 dark:bg-[#050505]/80 backdrop-blur-md border-b border-slate-200 dark:border-white/5 z-40 flex items-center px-6 gap-5 transition-all">
    
    <button (click)="toggleSidebar()" class="p-2 -ml-2 rounded-xl text-slate-500 dark:text-slate-400 hover:text-emerald-500 hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
    </button>

    <div class="flex flex-col justify-center translate-y-[1px]">
      <h1 class="text-xl md:text-2xl font-black tracking-tighter text-slate-900 dark:text-white uppercase leading-none">
        Parcelamentos <span class="text-emerald-500 font-medium">- Controle</span>
      </h1>
      <p class="text-[9px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mt-1">Evolução das suas compras</p>
    </div>

    <div class="ml-auto">
      <button (click)="toggleModal()" class="px-5 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-black font-black uppercase tracking-widest text-[10px] sm:text-xs rounded-xl hover:scale-105 hover:shadow-lg hover:shadow-black/10 dark:hover:shadow-white/10 transition-all active:scale-95">
        + Novo Parcelamento
      </button>
    </div>
  </nav>

  <main class="pt-24 p-6 max-w-[1600px] mx-auto w-full overflow-x-hidden flex-1 flex flex-col">
    
    <section class="space-y-3">
      @for (item of installments; track item.id) {
        <article class="group bg-white dark:bg-[#121212] p-5 rounded-[24px] border border-slate-200 dark:border-white/5 shadow-sm hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 flex flex-col lg:flex-row lg:items-center justify-between gap-5 overflow-hidden relative">
          
          <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b from-emerald-400 to-emerald-600 scale-y-0 group-hover:scale-y-100 transition-transform origin-bottom duration-300"></div>

          <div class="flex items-center gap-4 flex-1 pl-2">
            <div class="w-12 h-12 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/5 flex items-center justify-center text-slate-400 group-hover:text-emerald-500 transition-all duration-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            </div>
            <div>
              <h3 class="text-base font-black text-slate-900 dark:text-white tracking-tight uppercase">{{ item.name }}</h3>
              <span class="inline-block text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">{{ item.category }}</span>
            </div>
          </div>

          <div class="flex-1 w-full lg:w-auto">
            <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest mb-1.5">
              <span class="text-slate-400">Progresso</span>
              <span class="text-emerald-500">{{ item.currentParcel }} de {{ item.totalParcels }}</span>
            </div>
            <div class="h-2 w-full bg-slate-100 dark:bg-white/5 rounded-full overflow-hidden shadow-inner">
              <div class="h-full bg-gradient-to-r from-emerald-400 to-emerald-500 transition-all duration-1000 ease-out" 
                   [style.width.%]="getProgress(item.currentParcel, item.totalParcels)">
              </div>
            </div>
          </div>

          <div class="flex items-center justify-between lg:justify-end gap-6 flex-1">
            <div class="text-right">
              <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Valor da Parcela</p>
              <p class="text-xl font-black text-slate-900 dark:text-white tracking-tighter">{{ item.monthlyValue | currency:'BRL' }}</p>
            </div>
            
            <div class="flex gap-1.5">
              <button (click)="editInstallment(item.id)" class="p-2 bg-slate-50 dark:bg-white/5 hover:bg-emerald-500 hover:text-white rounded-lg transition-all text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
              <button (click)="deleteInstallment(item.id)" class="p-2 bg-slate-50 dark:bg-white/5 hover:bg-rose-500 hover:text-white rounded-lg transition-all text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
            </div>
          </div>
        </article>
      }
    </section>

    </main>
</div>
