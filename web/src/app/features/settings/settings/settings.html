<div class="min-h-screen bg-slate-50 dark:bg-[#050505] transition-colors duration-300 font-sans flex flex-col">
  <app-sidebar></app-sidebar>

  <!-- Navbar Fixa Premium -->
  <nav class="fixed top-2 left-5 right-0 h-20 bg-slate-50/80 dark:bg-[#050505]/80 backdrop-blur-md border-b border-slate-200 dark:border-white/5 z-40 flex items-center px-6 gap-5 transition-all">
    <button (click)="toggleSidebar()" class="p-2 -ml-2 rounded-xl text-slate-500 dark:text-slate-400 hover:text-emerald-500 hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
    </button>

    <div class="flex flex-col justify-center translate-y-[1px]">
      <h1 class="text-xl md:text-3xl font-black tracking-tighter text-slate-900 dark:text-white uppercase leading-none">
        Minhas <span class="text-emerald-500 font-medium">- Configurações</span>
      </h1>
    </div>
  </nav>

  <!-- Conteúdo Principal -->
  <main class="pt-24 p-6 max-w-[1600px] mx-auto w-full overflow-x-hidden flex-1 flex flex-col">

    @if (showSuccessMessage) {
      <div class="fixed top-20 right-4 md:right-8 bg-emerald-500/90 backdrop-blur-md text-white px-5 py-3 rounded-xl shadow-2xl font-black text-[9px] tracking-widest z-50 animate-in slide-in-from-top-2 fade-in duration-300">
        DADOS SALVOS COM SUCESSO!
      </div>
    }

    <div class="max-w-4xl mx-auto pb-10 space-y-6">
      
      <!-- Seção Principal de Perfil -->
      <section class="bg-white/80 dark:bg-[#121212]/80 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[24px] p-5 md:p-8 shadow-xl animate-in fade-in slide-in-from-bottom-2 duration-500">

        <div class="flex items-center gap-4 mb-6">
          <div class="w-14 h-14 bg-slate-100 dark:bg-white/5 rounded-2xl flex items-center justify-center border border-slate-200 dark:border-white/10 shrink-0">
            <svg class="w-7 h-7 text-slate-400 dark:text-slate-500" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
            </svg>
          </div>
          <div class="overflow-hidden">
            <h2 class="text-lg font-black text-slate-900 dark:text-white uppercase tracking-tight truncate">{{ currentName }}</h2>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em] truncate mt-0.5">{{ currentEmail }}</p>
          </div>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Nome Completo</label>
              <input formControlName="name" type="text" class="w-full bg-slate-50/50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white font-bold focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
            <div class="space-y-1.5">
              <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">E-mail</label>
              <input formControlName="email" type="email" class="w-full bg-slate-50/50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white font-bold focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
          </div>

          <div class="pt-4 border-t border-slate-100 dark:border-white/5 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label class="text-[9px] font-black text-emerald-500 uppercase tracking-[0.2em] ml-1">Salário (R$)</label>
              <input formControlName="monthlySalary" type="number" (wheel)="$event.preventDefault()" class="w-full bg-emerald-50/20 dark:bg-emerald-500/5 border border-emerald-100 dark:border-emerald-500/20 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white font-black tracking-wider focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
            <div class="space-y-1.5">
              <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Dia Recebimento</label>
              <input formControlName="payday" type="number" (wheel)="$event.preventDefault()" class="w-full bg-slate-50/50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white font-black tracking-wider focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
            </div>
          </div>

          <div class="pt-4 border-t border-slate-100 dark:border-white/5 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label class="text-[9px] font-black text-amber-500 uppercase tracking-[0.2em] ml-1">Reserva / Economias (R$)</label>
              <input formControlName="savings" type="number" (wheel)="$event.preventDefault()" class="w-full bg-amber-50/20 dark:bg-amber-500/5 border border-amber-100 dark:border-amber-500/20 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white font-black tracking-wider focus:ring-2 focus:ring-amber-500 outline-none transition-all">
            </div>
            <div class="space-y-1.5">
              <label class="text-[9px] font-black text-rose-500 uppercase tracking-[0.2em] ml-1">Reserva de Emergência (R$)</label>
              <input formControlName="emergency_reserve" type="number" (wheel)="$event.preventDefault()" class="w-full bg-rose-50/20 dark:bg-rose-500/5 border border-rose-100 dark:border-rose-500/20 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white font-black tracking-wider focus:ring-2 focus:ring-rose-500 outline-none transition-all">
            </div>
          </div>

          <div class="pt-4 border-t border-slate-100 dark:border-white/5 flex justify-end">
            <button type="submit" [disabled]="profileForm.invalid" class="w-full md:w-auto px-10 py-3 bg-emerald-500 text-emerald-950 font-black uppercase tracking-widest text-[9px] rounded-xl hover:bg-emerald-400 transition-all shadow-lg active:scale-95 disabled:opacity-50">
              Salvar Alterações
            </button>
          </div>
        </form>
      </section>

      <!-- Seção de Segurança -->
      <section class="bg-white/80 dark:bg-[#121212]/80 backdrop-blur-2xl border border-slate-200 dark:border-white/10 rounded-[24px] p-5 md:p-8 shadow-xl">
        <h3 class="text-[10px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-6">Segurança</h3>
        <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input formControlName="current_password" type="password" placeholder="SENHA ATUAL" class="w-full bg-slate-50/50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs text-slate-900 dark:text-white font-black tracking-widest focus:ring-2 focus:ring-blue-500 outline-none">
            <input formControlName="new_password" type="password" placeholder="NOVA SENHA" class="w-full bg-slate-50/50 dark:bg-[#050505] border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs text-slate-900 dark:text-white font-black tracking-widest focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="flex justify-end">
            <button type="submit" [disabled]="passwordForm.invalid" class="w-full md:w-auto px-10 py-3 bg-blue-600 text-white font-black uppercase tracking-widest text-[9px] rounded-xl active:scale-95 disabled:opacity-50 transition-all">
              Alterar Senha
            </button>
          </div>
        </form>
      </section>

      <!-- Zona de Perigo -->
      <section class="bg-rose-50/30 dark:bg-rose-500/5 border border-rose-200/30 dark:border-rose-500/10 rounded-[24px] p-5 md:p-8">
        <h3 class="text-[10px] font-black text-rose-600 dark:text-rose-500 uppercase tracking-[0.2em] mb-2">Zona de Perigo</h3>
        <p class="text-[9px] font-bold text-rose-600/60 dark:text-rose-400/60 mb-5 uppercase">A exclusão da conta é irreversível.</p>
        <button (click)="deleteAccount()" class="w-full md:w-auto px-10 py-3 bg-rose-500/90 text-white font-black uppercase tracking-widest text-[9px] rounded-xl hover:bg-rose-600 active:scale-95 transition-all">
          Deletar Minha Conta
        </button>
      </section>

    </div>
  </main>
</div>
